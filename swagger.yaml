openapi: 3.0.0
info:
  title: Backend Training API
  description: Comprehensive API documentation for backend training project
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Development server

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the server
      tags:
        - Health
      responses:
        '200':
          description: Server is running properly
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  message:
                    type: string
                    example: server is running properly
                  timestamps:
                    type: string
                    format: date-time
                    example: "2025-07-26T10:30:00.000Z"

  /seed:
    post:
      summary: Seed mock data
      description: Generates and returns mock data for testing purposes
      tags:
        - Data Management
      responses:
        '200':
          description: Data seeded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Data seeded sucessfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MockData'
                  count:
                    type: number
                    example: 10

  /login:
    post:
      summary: User login
      description: Authenticate user credentials and return JWT token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              example1:
                summary: Example login
                value:
                  username: john_doe
                  password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Bad request - Username and password are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /register:
    post:
      summary: Register new user
      description: Create a new user account
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              example1:
                summary: Example registration
                value:
                  username: new_user
                  password: newpassword123
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User registered successfully
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Bad request - Username and password are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile:
    get:
      summary: Get user profile
      description: Get authenticated user's profile information (protected route)
      tags:
        - User Management
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: This is a protected profile route
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/assignment/Day2/:
    get:
      summary: Day2 assignment home page
      description: Welcome page that displays cookies information
      tags:
        - Day2 Assignment
      responses:
        '200':
          description: Welcome message
          content:
            text/plain:
              schema:
                type: string
                example: Welcome to the Home Page

  /api/assignment/Day2/data:
    get:
      summary: Get Day2 mock user data
      description: Returns a list of mock users for Day2 assignment
      tags:
        - Day2 Assignment
      responses:
        '200':
          description: List of mock users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MockUser'

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: User's username
          example: john_doe
          minLength: 3
          maxLength: 50
        password:
          type: string
          description: User's password
          example: password123
          minLength: 6
          maxLength: 100

    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Desired username for new account
          example: new_user
          minLength: 3
          maxLength: 50
        password:
          type: string
          description: Password for new account
          example: newpassword123
          minLength: 6
          maxLength: 100

    User:
      type: object
      properties:
        id:
          type: number
          description: Unique user identifier
          example: 1
        username:
          type: string
          description: User's username
          example: john_doe

    MockUser:
      type: object
      properties:
        id:
          type: number
          description: User ID
          example: 1
        name:
          type: string
          description: User's full name
          example: John Doe
        email:
          type: string
          format: email
          description: User's email address
          example: john.doe@example.com
        age:
          type: number
          description: User's age
          example: 30
        department:
          type: string
          description: User's department
          example: Engineering

    MockData:
      type: object
      properties:
        id:
          type: number
          description: Data entry ID
          example: 1
        value:
          type: string
          description: Mock data value
          example: Sample data entry

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
          example: An error occurred

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the login endpoint

  responses:
    UnauthorizedError:
      description: Authentication information is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFoundError:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Validation error in request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Health
    description: Health check operations
  - name: Authentication
    description: User authentication and authorization
  - name: User Management
    description: User profile and management operations
  - name: Data Management
    description: Data seeding and management operations
  - name: Day2 Assignment
    description: Day2 assignment specific endpoints

externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io